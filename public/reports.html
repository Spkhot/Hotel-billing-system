<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darshan Hotel POS - Sales Reports</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js for Analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <!-- Dynamic Sidebar injected here by shared.js -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <section id="screen-reports" class="app-screen">
        <div class="screen-header">
          <div class="header-titles">
            <h2>Today's Summary Dashboard</h2>
            <p>Real-time analytics & daily item-wise sales tracking</p>
          </div>
        </div>

        <!-- Report KPI Cards -->
        <div class="reports-kpi-grid">
          <div class="kpi-card glass-card">
            <div class="kpi-icon color-blue">
              <i class="fa-solid fa-file-invoice"></i>
            </div>
            <div class="kpi-content">
              <span>Total Bills Today</span>
              <h3 id="report-total-bills">0</h3>
            </div>
          </div>

          <div class="kpi-card glass-card">
            <div class="kpi-icon color-green">
              <i class="fa-solid fa-indian-rupee-sign"></i>
            </div>
            <div class="kpi-content">
              <span>Total Revenue Today</span>
              <h3 id="report-total-revenue">₹0</h3>
            </div>
          </div>

          <div class="kpi-card glass-card">
            <div class="kpi-icon color-orange">
              <i class="fa-solid fa-bowl-food"></i>
            </div>
            <div class="kpi-content">
              <span>Most Sold Thali</span>
              <h3 id="report-most-sold-thali">N/A</h3>
            </div>
          </div>

          <div class="kpi-card glass-card">
            <div class="kpi-icon color-purple">
              <i class="fa-solid fa-glass-water"></i>
            </div>
            <div class="kpi-content">
              <span>Most Sold Extra Item</span>
              <h3 id="report-most-sold-extra">N/A</h3>
            </div>
          </div>
        </div>

        <!-- Analytics Layout -->
        <div class="reports-layout">
          <!-- Sales Chart -->
          <div class="reports-chart-card card">
            <h3>Item-wise Quantities Sold Today</h3>
            <div class="chart-container">
              <canvas id="salesChart"></canvas>
            </div>
          </div>

          <!-- Item-wise Sales Details List -->
          <div class="reports-details-card card">
            <h3>Sales by Item Breakdown</h3>
            <div class="item-sales-table-wrapper">
              <table class="data-table text-sm">
                <thead>
                  <tr>
                    <th>Item Name</th>
                    <th>Category</th>
                    <th class="text-center">Qty Sold</th>
                    <th class="text-right">Total Revenue</th>
                  </tr>
                </thead>
                <tbody id="report-items-table-body">
                  <!-- Dynamic Item Sales rows -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Shared and Reports Scripts -->
  <script src="js/shared.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
